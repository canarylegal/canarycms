# Canary production frontend: static SPA + reverse proxy for API, WebDAV, and ONLYOFFICE.
# Matches paths documented in vite.config.ts (Vite dev server). Keep /coauthoring here — otherwise
# those requests hit try_files → index.html and ONLYOFFICE print preview stays on "Loading…".

map $http_x_forwarded_proto $canary_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Preserve non-default ports (e.g. Tailscale :8080). $host strips the port and breaks ONLYOFFICE document.url.
map $http_host $canary_forwarded_host {
    default $http_host;
    ''      $host;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — re-resolve service names when containers are recreated. Without this,
    # nginx caches IPs from `upstream {}` / static proxy_pass at startup → 502 after backend/DS redeploy.
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 500m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript text/xml application/xml application/xml+rss;

    # Vite emits pdfjs worker as *.mjs under /assets/. mime.types may map .mjs to application/octet-stream;
    # browsers then refuse to load the worker module. Clear inherited types so default_type wins.
    location ~* \.mjs$ {
        types { }
        default_type application/javascript;
        charset utf-8;
        try_files $uri =404;
    }

    # ONLYOFFICE native print PDFs; optional inline disposition for consistent browser behaviour when debugging.
    location ^~ /printfile {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        add_header Content-Disposition "inline" always;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Never cache the SPA shell: each release points at new hashed /assets/* names. If index.html is cached,
    # users keep loading old index-*.js from disk even after deploy (see Network: 304 + “disk cache”).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Missing PNG under /icons/ must 404 — otherwise try_files falls through to index.html (200 + HTML)
    # and Outlook shows a broken icon for ``IconUrl`` / ribbon assets.
    location ^~ /icons/ {
        try_files $uri =404;
        access_log off;
    }

    # Outlook manifest URLs must serve real static files — SPA fallback returns HTML and breaks sideload validation.
    location ^~ /outlook-addin/ {
        try_files $uri =404;
        access_log off;
    }

    location ^~ /api/ {
        set $backend_upstream http://backend:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Canary-Token $http_x_canary_token;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /webdav {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Canary-Token $http_x_canary_token;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # RFC 6764 — entire ``/.well-known/`` tree (``caldav``, ``caldav/``, CardDAV, etc.). Use prefix + ``^~``
    # so this always beats ``location /``; ``location = /.well-known/caldav`` misses ``…/caldav/`` and falls through to the SPA.
    location ^~ /.well-known/ {
        gzip off;
        proxy_buffering off;
        set $radicale_upstream http://radicale:5232;
        proxy_pass $radicale_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Radicale CalDAV principals: /{user-uuid}/… (``location /`` SPA fallback is defined last in this file).
    # Regex is double-quoted so ``{8}`` / ``{4}`` are PCRE quantifiers; unquoted ``\{8\}`` is treated as literal braces and never matches a UUID.
    location ~ "^/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}(/.*)?$" {
        gzip off;
        proxy_buffering off;
        set $radicale_upstream http://radicale:5232;
        proxy_pass $radicale_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Document Server maps $the_prefix from this header (see OO ds-docservice.conf) for redirects and asset URLs.
    location ^~ /office-ds/ {
        set $onlyoffice_upstream http://onlyoffice:80;
        rewrite ^/office-ds/(.*)$ /$1 break;
        proxy_pass $onlyoffice_upstream;
        add_header Cache-Control "no-store" always;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /office-ds;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Docservice (Node) lives behind DS nginx at location / — CommandService, co-editing WS, etc.
    # Without this, /coauthoring/* falls through to try_files → SPA HTML and print preview stays on "Loading…".
    location ^~ /coauthoring {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /doc {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /web-apps {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /sdkjs {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /sdkjs-plugins {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /fonts {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
    }

    location ^~ /dictionaries {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
    }

    location ^~ /cache {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
    }

    location = /ConvertService.ashx {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ~ ^/\d+\.\d+\.\d+ {
        set $onlyoffice_upstream http://onlyoffice:80;
        proxy_pass $onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $canary_forwarded_host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$canary_forwarded_host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA shell last: never swallow /api, /webdav, Radicale UUID paths, or /.well-known/* above.
    location / {
        try_files $uri $uri/ /index.html;
    }

}
