<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Attach from Canary</title>
    <link rel="stylesheet" href="../canary-theme.css" />
    <link rel="stylesheet" href="attach-picker.css" />
  </head>
  <body>
    <div class="attach-shell">
      <header class="attach-head">
        <h1>Attach from Canary</h1>
        <button type="button" class="ghost" id="btn-close">Cancel</button>
      </header>
      <p id="matter-line" class="matter-line muted"></p>
      <div id="picker-root" class="picker-root" role="listbox" aria-label="Case files"></div>
      <footer class="attach-foot">
        <p id="selection-line" class="selection-line muted">No files selected</p>
        <button type="button" class="primary" id="btn-attach" disabled>Attach to message</button>
      </footer>
      <p id="err" class="err" hidden></p>
    </div>
    <script src="../canary-shared.js"></script>
    <script src="../compose-store.js"></script>
    <script src="../compose-attach-ui.js"></script>
    <script src="attach-picker.js"></script>
  </body>
</html>
