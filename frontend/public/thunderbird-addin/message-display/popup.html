<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Canary</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <p>
        A <strong>checkmark (✓)</strong> on the <strong>Canary</strong> button in this message
        window means the message is already stored in a Canary matter (matched by
        <code>Message-ID</code>).
      </p>
      <p>Messages you file from the main <strong>Canary</strong> toolbar are also
        <strong>starred</strong> in the list so you can see them at a glance even when the
        <strong>Tags</strong> column is hidden.
      </p>
    </div>
  </body>
</html>
