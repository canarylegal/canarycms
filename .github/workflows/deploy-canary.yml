# Deploy Canary on a host where a GitHub **self-hosted** runner is registered for this repository.
# Trigger manually from the Actions tab or via the GitHub API / other automation (the Canary app no longer dispatches workflows).
#
# Prerequisites on the runner machine:
#   - Docker and Docker Compose v2
#   - For default mode: runner working directory contains docker-compose.yml and .env
#   - For host_checkout mode: CANARY_COMPOSE_HOST_PROJECT_DIR (default /opt/canarycms) is the live install
#   - COMPOSE_PROFILES in the environment or in .env (e.g. prod)
name: Deploy Canary

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment label (informational)
        required: false
        default: production
        type: string
      host_checkout:
        description: Reset and deploy from the host install path (e.g. /opt/canarycms) instead of the runner _work checkout
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-canary-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 90
    steps:
      - name: Reset host compose checkout
        if: inputs.host_checkout
        shell: bash
        run: |
          set -euo pipefail
          dir="${CANARY_COMPOSE_HOST_PROJECT_DIR:-/opt/canarycms}"
          ref="${CANARY_GITHUB_DEPLOY_REF:-main}"
          echo "Resetting ${dir} to origin/${ref}"
          if [[ ! -d "${dir}/.git" ]]; then
            echo "No .git in ${dir}" >&2
            exit 1
          fi
          git -c "safe.directory=${dir}" -C "${dir}" fetch origin "${ref}"
          git -c "safe.directory=${dir}" -C "${dir}" reset --hard "origin/${ref}"
          git -c "safe.directory=${dir}" -C "${dir}" rev-parse HEAD

      - name: Checkout
        if: ${{ !inputs.host_checkout }}
        uses: actions/checkout@v6

      - name: Docker Compose
        # GIT_COMMIT is consumed by docker-compose.yml's backend build-args and baked into the image as
        # CANARY_BUILD_COMMIT (see backend/Dockerfile). Without it the image reports commit "unknown" and
        # the in-app update prompt (/admin/deploy/update-check) silently refuses to detect new commits.
        env:
          GIT_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploy label: ${{ inputs.environment }}"
          echo "GIT_COMMIT: ${GIT_COMMIT}"
          if ! command -v docker >/dev/null 2>&1; then
            echo "docker not found on runner" >&2
            exit 1
          fi
          if [[ "${{ inputs.host_checkout }}" == "true" ]]; then
            cd "${CANARY_COMPOSE_HOST_PROJECT_DIR:-/opt/canarycms}"
            export GIT_COMMIT="$(git rev-parse HEAD)"
            echo "Host checkout HEAD: ${GIT_COMMIT}"
          fi
          profile="${COMPOSE_PROFILES:-prod}"
          docker compose --profile "$profile" build --pull
          docker compose --profile "$profile" up -d
